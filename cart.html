<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 优选商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- =============================================
         顶部信息栏 + 主头部 + 分类导航（与首页共用）
         ============================================= -->
    <div class="top-bar">
        <div class="container">
            <div class="left-links">
                <a href="index.html">优选商城欢迎您！</a>
                <a href="#">我的订单</a>
                <a href="#">客户服务</a>
            </div>
            <div class="right-links">
                <a href="login.html" class="login-link">登录</a>
                <a href="login.html#register" class="login-link">注册</a>
                <span class="user-info" style="display:none;"></span>
                <button class="btn-logout" style="display:none;" onclick="logout()">退出</button>
                <a href="cart.html">购物车 <span id="cart-badge" class="badge" style="display:none;">0</span></a>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">U</div>
                <div class="logo-text">优选<span>商城</span></div>
            </a>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索商品、品牌、分类...">
                <button id="search-btn">🔍 搜索</button>
            </div>
            <div class="header-actions">
                <a href="profile.html" class="header-action-item">
                    <span class="icon">👤</span>
                    <span class="label">个人中心</span>
                </a>
                <a href="cart.html" class="header-action-item">
                    <span class="icon">🛒</span>
                    <span class="label">购物车</span>
                    <span id="cart-badge" class="badge" style="display:none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- =============================================
         购物车内容区域
         支持空状态、登录提示、商品列表三种显示
         实现方式：renderCart() 根据 AppState 状态动态切换显示内容
         ============================================= -->
    <main class="main-content">
        <div class="container">
            <div class="cart-page">
                <h2 style="font-size:24px;font-weight:700;margin-bottom:24px;">我的购物车</h2>
                
                <!-- 状态1：未登录提示 -->
                <div class="cart-empty" id="cart-empty" style="display:none;">
                    <div class="empty-icon">🛒</div>
                    <p>购物车还是空的，快去挑选心仪的商品吧！</p>
                    <a href="index.html" class="btn-go-shopping">去购物</a>
                </div>

                <!-- 状态2：购物车商品列表 -->
                <div id="cart-content">
                    <!-- 购物车表格 -->
                    <div class="cart-table" id="cart-table">
                        <!-- 表头 -->
                        <div class="cart-table-header">
                            <span></span>
                            <span>商品信息</span>
                            <span>单价</span>
                            <span>数量</span>
                            <span>小计</span>
                            <span>操作</span>
                        </div>
                        <!-- 商品列表（动态渲染） -->
                        <div id="cart-items"></div>
                    </div>

                    <!-- 底部结算栏 -->
                    <div class="cart-footer" id="cart-footer" style="display:none;">
                        <!-- 全选复选框 -->
                        <div class="select-all">
                            <input type="checkbox" id="select-all" onchange="handleSelectAll(this.checked)">
                            <label for="select-all">全选</label>
                        </div>
                        <!-- 结算信息 -->
                        <div class="cart-summary">
                            <span class="total-text">已选 <strong id="selected-count">0</strong> 件，合计：</span>
                            <span class="total-price" id="total-price">¥0.00</span>
                            <button class="btn-checkout" onclick="goCheckout()">去结算</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>购物指南</h4>
                    <a href="#">购物流程</a><a href="#">会员介绍</a><a href="#">常见问题</a><a href="#">联系客服</a>
                </div>
                <div class="footer-col">
                    <h4>配送方式</h4>
                    <a href="#">上门自提</a><a href="#">快递运输</a><a href="#">物流配送</a><a href="#">配送范围</a>
                </div>
                <div class="footer-col">
                    <h4>支付方式</h4>
                    <a href="#">货到付款</a><a href="#">在线支付</a><a href="#">分期付款</a><a href="#">银行卡支付</a>
                </div>
                <div class="footer-col">
                    <h4>售后服务</h4>
                    <a href="#">退换货政策</a><a href="#">退换货流程</a><a href="#">价格保护</a><a href="#">投诉建议</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 优选商城 | 24215220120_陈学羽_大作业 | Web编程技术课程设计</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // =============================================
        // 购物车页专属脚本
        // 函数: renderCart()、updateCartSummary()、handleItemCheck()、
        //       handleSelectAll()、changeItemQty()、changeItemQtyInput()、
        //       handleDelete()、goCheckout()
        // 实现方式：Array.map().join('') 动态渲染表格行 + Array.filter()/reduce() 计算汇总
        // =============================================

        /**
         * 渲染购物车内容
         * 根据登录状态和购物车是否为空显示不同界面
         * 实现方式：innerHTML 替换内容 + style.display 控制三种状态切换
         */
        function renderCart() {
            const cartItemsEl = document.getElementById('cart-items');
            const cartEmptyEl = document.getElementById('cart-empty');
            const cartFooterEl = document.getElementById('cart-footer');
            
            // 未登录：显示登录提示
            if (!AppState.currentUser) {
                cartEmptyEl.style.display = '';
                cartEmptyEl.innerHTML = `
                    <div class="empty-icon">🔒</div>
                    <p>请先登录后查看购物车</p>
                    <a href="login.html" class="btn-go-shopping">去登录</a>
                `;
                document.getElementById('cart-content').style.display = 'none';
                return;
            }
            
            // 购物车为空：显示空状态
            if (AppState.cart.length === 0) {
                cartEmptyEl.style.display = '';
                document.getElementById('cart-content').style.display = 'none';
                return;
            }
            
            // 有商品：渲染商品列表
            cartEmptyEl.style.display = 'none';
            document.getElementById('cart-content').style.display = '';
            
            // 使用 map 生成每行购物车项的 HTML
            cartItemsEl.innerHTML = AppState.cart.map(item => `
                <div class="cart-item">
                    <!-- 选中复选框 -->
                    <div class="item-checkbox">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="handleItemCheck(${item.productId})">
                    </div>
                    <!-- 商品图片 + 名称 -->
                    <div class="item-product" onclick="viewProductDetail(${item.productId})" style="cursor:pointer;">
                        <div class="item-image">
                            <img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<div style=display:flex;align-items:center;justify-content:center;color:#999;font-size:32px;>📦</div>'">
                        </div>
                        <div class="item-name">${item.name}</div>
                    </div>
                    <!-- 单价 -->
                    <div class="item-price">¥${item.price.toFixed(2)}</div>
                    <!-- 数量选择器 -->
                    <div class="item-quantity">
                        <button class="qty-btn" onclick="changeItemQty(${item.productId}, -1)">−</button>
                        <input type="number" class="qty-input" value="${item.quantity}" min="1" max="99" style="width:50px;" onchange="changeItemQtyInput(${item.productId}, this.value)">
                        <button class="qty-btn" onclick="changeItemQty(${item.productId}, 1)">+</button>
                    </div>
                    <!-- 小计 = 单价 × 数量 -->
                    <div class="item-total">¥${(item.price * item.quantity).toFixed(2)}</div>
                    <!-- 删除按钮 -->
                    <button class="btn-delete" onclick="handleDelete(${item.productId})">删除</button>
                </div>
            `).join('');
            
            // 显示结算栏
            cartFooterEl.style.display = '';
            updateCartSummary();
        }
        
        /**
         * 更新购物车底部结算信息
         * 实现方式：Array.filter() 筛选选中商品 + Array.reduce() 计算总数/总金额
         */
        function updateCartSummary() {
            const checkedItems = AppState.cart.filter(i => i.checked);
            // 已选商品总件数
            document.getElementById('selected-count').textContent = checkedItems.reduce((s, i) => s + i.quantity, 0);
            // 已选商品总金额
            document.getElementById('total-price').textContent = '¥' + getCartTotal().toFixed(2);
            // 全选框状态：所有商品都被选中时才勾选
            document.getElementById('select-all').checked = AppState.cart.length > 0 && AppState.cart.every(i => i.checked);
        }
        
        /**
         * 单个商品复选框变化
         * @param {number} productId - 商品ID
         */
        function handleItemCheck(productId) {
            toggleCartItemCheck(productId);
            renderCart();
        }
        
        /**
         * 全选/取消全选
         * @param {boolean} checked - 选中状态
         */
        function handleSelectAll(checked) {
            toggleAllCartCheck(checked);
            renderCart();
        }
        
        /**
         * 修改商品数量（+/-按钮）
         * @param {number} productId - 商品ID
         * @param {number} delta - 变化量
         * 实现方式：Array.find() 定位商品 + updateCartQuantity() 更新 + renderCart() 刷新视图
         */
        function changeItemQty(productId, delta) {
            const item = AppState.cart.find(i => i.productId === productId);
            if (item) {
                updateCartQuantity(productId, item.quantity + delta);
                renderCart();  // 重新渲染以更新显示
            }
        }
        
        /**
         * 手动输入数量
         * @param {number} productId - 商品ID
         * @param {string|number} value - 输入值
         */
        function changeItemQtyInput(productId, value) {
            const qty = parseInt(value) || 1;
            updateCartQuantity(productId, qty);
            renderCart();
        }
        
        /**
         * 删除购物车商品
         * @param {number} productId - 商品ID
         * 实现方式：removeFromCart() 全局函数删除 + showToast() 提示 + renderCart() 刷新
         */
        function handleDelete(productId) {
            removeFromCart(productId);
            showToast('已从购物车移除', 'info');
            renderCart();
        }
        
        /**
         * 去结算
         * 验证有选中商品后跳转到结算页
         * 实现方式：Array.filter() 检查选中商品 + window.location.href 跳转
         */
        function goCheckout() {
            const checkedItems = AppState.cart.filter(i => i.checked);
            if (checkedItems.length === 0) {
                showToast('请选择要结算的商品', 'error');
                return;
            }
            window.location.href = 'checkout.html';
        }
        
        // 页面加载完成后渲染购物车
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
</html>
