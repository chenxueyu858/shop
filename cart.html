<body>

                <a href="cart.html">购物车 <span id="cart-badge" class="badge" style="display:none;">0</span></a>
            </div>
        </div>

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">U</div>

            <div class="search-box">

                <a href="profile.html" class="header-action-item">

                    <span class="label">个人中心</span>
                </a>
                <a href="cart.html" class="header-action-item">
                    <span class="icon">🛒</span>

            </div>

    </header>

    <!-- =============================================
         购物车内容区域
         【答辩要点】购物车有三种显示状态：
         状态1（未登录）：🔒 图标 + "请先登录" + 去登录按钮
         状态2（空购物车）：🛒 图标 + "购物车空" + 去购物按钮
         状态3（有商品）：商品表格 + 底部结算栏
         
         商品表格使用 Grid 6列布局：
         复选框(50px) | 商品信息(弹性) | 单价(120px) | 数量(140px) | 小计(140px) | 操作(100px)
         
         结算栏包含：全选复选框 + 已选数量/总价 + 结算按钮
         
         数据流：操作 → AppState.cart 变化 → saveCartToStorage() → renderCart() 重新渲染
         ============================================= -->
    <main class="main-content">
        <div class="container">
            <div class="cart-page">
                <h2 style="font-size:24px;font-weight:700;margin-bottom:24px;">我的购物车</h2>
                
                <!-- 状态1/2：空购物车/未登录提示（共用容器） -->
                <div class="cart-empty" id="cart-empty" style="display:none;">
                    <div class="empty-icon">🛒</div>
                    <p>购物车还是空的，快去挑选心仪的商品吧！</p>
                    <a href="index.html" class="btn-go-shopping">去购物</a>
                </div>

                <!-- 状态3：购物车商品列表 -->
                <div id="cart-content">
                    <!-- 购物车表格 -->
                    <div class="cart-table" id="cart-table">
                        <!-- 表头：6列 Grid 布局 -->
                        <!-- grid-template-columns: 50px 1fr 120px 140px 140px 100px -->
                        <div class="cart-table-header">
                            <span></span>        <!-- 复选框列（空标题） -->
                            <span>商品信息</span>  <!-- 商品图片+名称 -->
                            <span>单价</span>      <!-- 单价 -->
                            <span>数量</span>      <!-- 数量选择器 -->
                            <span>小计</span>      <!-- 单价×数量 -->
                            <span>操作</span>      <!-- 删除按钮 -->
                        </div>
                        <!-- 商品列表：JS 动态渲染 -->
                        <div id="cart-items"></div>
                    </div>

                    <!-- 底部结算栏 -->
                    <div class="cart-footer" id="cart-footer" style="display:none;">
                        <!-- 全选复选框 -->
                        <div class="select-all">
                            <input type="checkbox" id="select-all" onchange="handleSelectAll(this.checked)">
                            <!-- this.checked：复选框当前选中状态（true/false） -->
                            <label for="select-all">全选</label>
                        </div>
                        <!-- 结算信息 -->
                        <div class="cart-summary">
                            <span class="total-text">已选 <strong id="selected-count">0</strong> 件，合计：</span>
                            <span class="total-price" id="total-price">¥0.00</span>
                            <button class="btn-checkout" onclick="goCheckout()">去结算</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>购物指南</h4>
                    <a href="#">购物流程</a><a href="#">会员介绍</a><a href="#">常见问题</a><a href="#">联系客服</a>
                </div>
                <div class="footer-col">
                    <h4>配送方式</h4>
                    <a href="#">上门自提</a><a href="#">快递运输</a><a href="#">物流配送</a><a href="#">配送范围</a>
                </div>
                <div class="footer-col">
                    <h4>支付方式</h4>
                    <a href="#">货到付款</a><a href="#">在线支付</a><a href="#">分期付款</a><a href="#">银行卡支付</a>
                </div>
                <div class="footer-col">
                    <h4>售后服务</h4>
                    <a href="#">退换货政策</a><a href="#">退换货流程</a><a href="#">价格保护</a><a href="#">投诉建议</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 优选商城 | 24215220120_陈学羽_大作业 | Web编程技术课程设计</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // =============================================
        // 购物车页专属脚本
        // 【答辩要点】购物车是"数据驱动视图"的典型应用。
        // 核心设计模式：
        //   操作 → 修改 AppState.cart → saveCartToStorage() → renderCart() 全量重渲染
        // 
        // 这是简化版的"全量更新"策略：
        //   优点：逻辑简单，不易出错，状态一致性好
        //   缺点：数据量大时性能较差（本项目数据量小，可接受）
        //
        // 【答辩问答】Q：购物车全选怎么实现的？
        // A：全选复选框变化时，用 forEach 遍历购物车每项，把 checked 设成和全选框一样。
        //   反过来，每个单项变化时用 every() 检查是否全部选中，更新全选框状态。
        //   every() 是数组方法，所有元素都满足条件才返回 true。
        //
        // Q：购物车删除商品怎么做的？
        // A：filter() 筛选出 ID 不等于要删除的商品，生成新数组替换 cart。
        //   不用 splice 直接删除是因为 filter 返回新数组，不修改原数组，这叫"不可变数据"。
        //
        // 关键函数：
        //   - renderCart()：根据状态渲染购物车（三态切换）
        //   - updateCartSummary()：更新底部结算信息
        //   - handleItemCheck()：单选/取消
        //   - handleSelectAll()：全选/取消全选
        //   - changeItemQty()：修改数量
        //   - handleDelete()：删除商品
        //   - goCheckout()：跳转结算页
        // =============================================

        /**
         * 渲染购物车内容
         * 【答辩要点】三种状态的判断和渲染：
         *   1. 未登录 → 登录提示
         *   2. 购物车空 → 空状态
         *   3. 有商品 → 表格 + 结算栏
         * 
         * 商品行使用模板字符串 + map().join() 生成 HTML。
         * 每行包含：复选框 | 商品图片+名称 | 单价 | 数量选择器 | 小计 | 删除按钮
         */
        function renderCart() {
            const cartItemsEl = document.getElementById('cart-items');    // 商品列表容器
            const cartEmptyEl = document.getElementById('cart-empty');    // 空状态容器
            const cartFooterEl = document.getElementById('cart-footer');  // 结算栏
            
            // === 状态1：未登录 ===
            if (!AppState.currentUser) {
                cartEmptyEl.style.display = '';  // 显示空状态区
                cartEmptyEl.innerHTML = `
                    <div class="empty-icon">🔒</div>
                    <p>请先登录后查看购物车</p>
                    <a href="login.html" class="btn-go-shopping">去登录</a>
                `;
                document.getElementById('cart-content').style.display = 'none';  // 隐藏商品列表
                return;
            }
            
            // === 状态2：购物车为空 ===
            if (AppState.cart.length === 0) {
                cartEmptyEl.style.display = '';  // 显示空状态（保持默认 HTML 内容）
                document.getElementById('cart-content').style.display = 'none';
                return;
            }
            
            // === 状态3：有商品 → 渲染列表 ===
            cartEmptyEl.style.display = 'none';          // 隐藏空状态
            document.getElementById('cart-content').style.display = '';  // 显示商品列表
            
            // ★ 核心渲染：map() 遍历购物车 → 模板字符串生成 HTML → join() 拼接 → innerHTML
            cartItemsEl.innerHTML = AppState.cart.map(item => `
                <div class="cart-item">
                    <!-- 1. 复选框：绑定 item.checked 状态 -->
                    <div class="item-checkbox">
                        <!-- ${item.checked ? 'checked' : ''}：动态设置复选框状态 -->
                        <input type="checkbox" ${item.checked ? 'checked' : ''} 
                               onchange="handleItemCheck(${item.productId})">
                    </div>
                    <!-- 2. 商品信息：点击跳转详情页 -->
                    <div class="item-product" onclick="viewProductDetail(${item.productId})" style="cursor:pointer;">
                        <div class="item-image">
                            <img src="${item.image}" alt="${item.name}" 
                                 onerror="this.parentElement.innerHTML='<div style=...>📦</div>'">
                        </div>
                        <div class="item-name">${item.name}</div>
                    </div>
                    <!-- 3. 单价 -->
                    <div class="item-price">¥${item.price.toFixed(2)}</div>
                    <!-- 4. 数量选择器：减号 + 输入框 + 加号 -->
                    <div class="item-quantity">
                        <button class="qty-btn" onclick="changeItemQty(${item.productId}, -1)">−</button>
                        <input type="number" class="qty-input" value="${item.quantity}" 
                               min="1" max="99" style="width:50px;" 
                               onchange="changeItemQtyInput(${item.productId}, this.value)">
                        <button class="qty-btn" onclick="changeItemQty(${item.productId}, 1)">+</button>
                    </div>
                    <!-- 5. 小计：单价 × 数量 -->
                    <div class="item-total">¥${(item.price * item.quantity).toFixed(2)}</div>
                    <!-- 6. 删除按钮 -->
                    <button class="btn-delete" onclick="handleDelete(${item.productId})">删除</button>
                </div>
            `).join('');
            
            // 显示结算栏并更新汇总信息
            cartFooterEl.style.display = '';
            updateCartSummary();
        }
        
        /**
         * 更新购物车底部结算信息
         * 【答辩要点】汇总计算三个值：
         *   1. 已选件数：filter(checked) → reduce(累加 quantity)
         *   2. 总金额：getCartTotal()（内部也是 filter + reduce）
         *   3. 全选状态：every(i => i.checked)
         */
        function updateCartSummary() {
            // filter：筛选选中的商品
            const checkedItems = AppState.cart.filter(i => i.checked);
            // reduce：累加已选商品的总件数
            document.getElementById('selected-count').textContent = 
                checkedItems.reduce((s, i) => s + i.quantity, 0);
            // 总金额
            document.getElementById('total-price').textContent = 
                '¥' + getCartTotal().toFixed(2);
            // ★ 全选框状态同步：所有商品都选中 → 勾选全选框
            // every()：所有元素满足条件返回 true，否则 false
            document.getElementById('select-all').checked = 
                AppState.cart.length > 0 && AppState.cart.every(i => i.checked);
        }
        
        /**
         * 单个商品复选框变化
         * @param {number} productId - 商品ID
         * 【答辩要点】切换选中状态 → 重新渲染整个购物车。
         */
        function handleItemCheck(productId) {
            toggleCartItemCheck(productId);  // 切换 AppState 中的 checked
            renderCart();                     // 重新渲染
        }
        
        /**
         * 全选/取消全选
         * @param {boolean} checked - 全选状态
         */
        function handleSelectAll(checked) {
            toggleAllCartCheck(checked);  // 遍历设置所有项的 checked
            renderCart();
        }
        
        /**
         * 修改商品数量（+/-按钮）
         * @param {number} productId - 商品ID
         * @param {number} delta - 变化量（+1 或 -1）
         * 【答辩要点】先找到商品，计算新数量，调用 updateCartQuantity 更新。
         */
        function changeItemQty(productId, delta) {
            const item = AppState.cart.find(i => i.productId === productId);
            if (item) {
                updateCartQuantity(productId, item.quantity + delta);  // 新数量 = 原数量 + 变化量
                renderCart();  // 重新渲染（更新小计和汇总）
            }
        }
        
        /**
         * 手动输入数量
         * @param {number} productId - 商品ID
         * @param {string|number} value - 输入值
         */
        function changeItemQtyInput(productId, value) {
            const qty = parseInt(value) || 1;  // 转为整数，无效默认 1
            updateCartQuantity(productId, qty);
            renderCart();
        }
        
        /**
         * 删除购物车商品
         * @param {number} productId - 商品ID
         * 【答辩要点】数据流：removeFromCart → showToast → renderCart
         * removeFromCart 内部用 filter 创建不含该商品的新数组。
         */
        function handleDelete(productId) {
            removeFromCart(productId);  // 全局函数：filter 删除
            showToast('已从购物车移除', 'info');
            renderCart();  // 重新渲染（如果删除后为空，自动切换到空状态）
        }
        
        /**
         * 去结算
         * 【答辩要点】验证有选中商品后跳转结算页。
         * 数据已存储在 AppState 和 LocalStorage 中，结算页直接读取。
         */
        function goCheckout() {
            const checkedItems = AppState.cart.filter(i => i.checked);
            if (checkedItems.length === 0) {
                showToast('请选择要结算的商品', 'error');  // 无选中商品：提示错误
                return;
            }
            window.location.href = 'checkout.html';  // 跳转结算页
        }
        
        // ★ 页面加载完成后渲染购物车
        document.addEventListener('DOMContentLoaded', renderCart);
    </script>
</body>
