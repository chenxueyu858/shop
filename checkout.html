<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提交订单 - 优选商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- =============================================
         顶部信息栏 + 主头部（与首页共用）
         ============================================= -->
    <div class="top-bar">
        <div class="container">
            <div class="left-links">
                <a href="index.html">优选商城欢迎您！</a>
                <a href="#">我的订单</a>
                <a href="#">客户服务</a>
            </div>
            <div class="right-links">
                <a href="login.html" class="login-link">登录</a>
                <span class="user-info" style="display:none;"></span>
                <button class="btn-logout" style="display:none;" onclick="logout()">退出</button>
                <a href="cart.html">购物车 <span id="cart-badge" class="badge" style="display:none;">0</span></a>
            </div>
        </div>
    </div>

    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">U</div>
                <div class="logo-text">优选<span>商城</span></div>
            </a>
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索商品、品牌、分类...">
                <button id="search-btn">🔍 搜索</button>
            </div>
            <div class="header-actions">
                <a href="profile.html" class="header-action-item">
                    <span class="icon">👤</span>
                    <span class="label">个人中心</span>
                </a>
                <a href="cart.html" class="header-action-item">
                    <span class="icon">🛒</span>
                    <span class="label">购物车</span>
                    <span id="cart-badge" class="badge" style="display:none;">0</span>
                </a>
            </div>
        </div>
    </header>

    <!-- =============================================
         结算页面
         左右两栏布局：
         左侧：收货地址 + 支付方式 + 订单商品列表
         右侧：订单汇总 + 提交按钮（sticky 定位）
         实现方式：renderCheckout() 渲染页面 + placeOrder() 提交订单
         ============================================= -->
    <main class="main-content">
        <div class="container">
            <div class="checkout-page">
                <h2 style="font-size:24px;font-weight:700;margin-bottom:24px;">确认订单</h2>
                
                <!-- 状态1：未登录提示 -->
                <div id="checkout-not-login" style="display:none;text-align:center;padding:80px;">
                    <p style="font-size:18px;color:#999;margin-bottom:20px;">请先登录后再结算</p>
                    <a href="login.html" class="btn-go-shopping">去登录</a>
                </div>

                <!-- 状态2：无选中商品 -->
                <div id="checkout-empty" style="display:none;text-align:center;padding:80px;">
                    <p style="font-size:18px;color:#999;margin-bottom:20px;">没有待结算的商品</p>
                    <a href="cart.html" class="btn-go-shopping">返回购物车</a>
                </div>

                <!-- 状态3：结算表单 -->
                <div class="checkout-grid" id="checkout-content">
                    <!-- ===== 左侧：表单区 ===== -->
                    <div class="checkout-left">
                        <!-- 收货地址表单 -->
                        <div class="checkout-section">
                            <h3>📍 收货地址</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>收货人 *</label>
                                    <div class="input-wrapper">
                                        <input type="text" id="receiver-name" placeholder="请输入收货人姓名" style="padding-left:16px;">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>手机号 *</label>
                                    <div class="input-wrapper">
                                        <input type="tel" id="receiver-phone" placeholder="请输入收货手机号" style="padding-left:16px;">
                                    </div>
                                </div>
                            </div>
                            <div class="form-group full-width" style="margin-top:16px;">
                                <label>详细地址 *</label>
                                <div class="input-wrapper">
                                    <input type="text" id="receiver-address" placeholder="省/市/区/详细地址" style="padding-left:16px;">
                                </div>
                            </div>
                        </div>

                        <!-- 支付方式选择 -->
                        <div class="checkout-section">
                            <h3>💳 支付方式</h3>
                            <div style="display:flex;gap:16px;flex-wrap:wrap;">
                                <!-- 微信支付（默认选中） -->
                                <label style="display:flex;align-items:center;gap:8px;padding:12px 20px;border:2px solid var(--primary);border-radius:8px;cursor:pointer;background:var(--primary-light);">
                                    <input type="radio" name="payment" value="wechat" checked style="accent-color:var(--primary);"> 微信支付
                                </label>
                                <!-- 支付宝 -->
                                <label style="display:flex;align-items:center;gap:8px;padding:12px 20px;border:2px solid var(--border);border-radius:8px;cursor:pointer;">
                                    <input type="radio" name="payment" value="alipay" style="accent-color:var(--primary);"> 支付宝
                                </label>
                                <!-- 银行卡 -->
                                <label style="display:flex;align-items:center;gap:8px;padding:12px 20px;border:2px solid var(--border);border-radius:8px;cursor:pointer;">
                                    <input type="radio" name="payment" value="card" style="accent-color:var(--primary);"> 银行卡
                                </label>
                            </div>
                        </div>

                        <!-- 订单商品列表 -->
                        <div class="checkout-section">
                            <h3>📦 订单商品</h3>
                            <div class="checkout-items" id="checkout-items"></div>
                        </div>
                    </div>

                    <!-- ===== 右侧：结算汇总（sticky 跟随滚动） ===== -->
                    <div class="checkout-right">
                        <div class="checkout-summary" id="checkout-summary">
                            <h3>订单汇总</h3>
                            <div class="summary-row">
                                <span>商品总价</span>
                                <span id="summary-subtotal">¥0.00</span>
                            </div>
                            <div class="summary-row">
                                <span>运费</span>
                                <span id="summary-freight">免运费</span>
                            </div>
                            <!-- 应付总额（突出显示） -->
                            <div class="summary-row total">
                                <span>应付总额</span>
                                <span id="summary-total">¥0.00</span>
                            </div>
                            <button class="btn-place-order" onclick="placeOrder()">提交订单</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>购物指南</h4>
                    <a href="#">购物流程</a><a href="#">会员介绍</a><a href="#">常见问题</a><a href="#">联系客服</a>
                </div>
                <div class="footer-col">
                    <h4>配送方式</h4>
                    <a href="#">上门自提</a><a href="#">快递运输</a><a href="#">物流配送</a><a href="#">配送范围</a>
                </div>
                <div class="footer-col">
                    <h4>支付方式</h4>
                    <a href="#">货到付款</a><a href="#">在线支付</a><a href="#">分期付款</a><a href="#">银行卡支付</a>
                </div>
                <div class="footer-col">
                    <h4>售后服务</h4>
                    <a href="#">退换货政策</a><a href="#">退换货流程</a><a href="#">价格保护</a><a href="#">投诉建议</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 优选商城 | 24215220120_陈学羽_大作业 | Web编程技术课程设计</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // =============================================
        // 结算页专属脚本
        // 函数: renderCheckout()、updateSummary()、placeOrder()
        // 实现方式：Array.filter() 获取选中商品 + Array.map().join('') 渲染商品列表
        //           + createOrder() 创建订单 + setTimeout() 延迟跳转
        // =============================================

        /**
         * 渲染结算页面
         * 根据登录状态和购物车选中商品显示不同内容
         * 实现方式：style.display 控制三种状态切换 + value 赋值预填用户信息
         */
        function renderCheckout() {
            // 检查登录状态
            if (!AppState.currentUser) {
                document.getElementById('checkout-not-login').style.display = '';
                document.getElementById('checkout-content').style.display = 'none';
                return;
            }
            
            // 检查是否有选中的商品
            const checkedItems = AppState.cart.filter(i => i.checked);
            if (checkedItems.length === 0) {
                document.getElementById('checkout-empty').style.display = '';
                document.getElementById('checkout-content').style.display = 'none';
                return;
            }
            
            // 显示结算表单
            document.getElementById('checkout-content').style.display = '';
            
            // 预填用户信息（从登录信息自动填充收货人）
            document.getElementById('receiver-name').value = AppState.currentUser.name || '';
            document.getElementById('receiver-phone').value = AppState.currentUser.phone || '';
            
            // 渲染选中商品的列表
            const itemsEl = document.getElementById('checkout-items');
            itemsEl.innerHTML = checkedItems.map(item => `
                <div class="checkout-item">
                    <!-- 商品缩略图 -->
                    <div class="co-image">
                        <img src="${item.image}" alt="${item.name}" onerror="this.parentElement.innerHTML='<div style=display:flex;align-items:center;justify-content:center;color:#999;font-size:24px;>📦</div>'">
                    </div>
                    <!-- 商品信息 -->
                    <div class="co-info">
                        <div class="co-name">${item.name}</div>
                        <div class="co-price">¥${item.price.toFixed(2)} × ${item.quantity}</div>
                    </div>
                    <!-- 小计金额 -->
                    <div class="co-total">¥${(item.price * item.quantity).toFixed(2)}</div>
                </div>
            `).join('');
            
            // 更新汇总信息
            updateSummary();
        }
        
        /**
         * 更新订单汇总（总价等）
         * 实现方式：getCartTotal() 计算选中商品总金额 + textContent 更新显示
         */
        function updateSummary() {
            const total = getCartTotal();
            document.getElementById('summary-subtotal').textContent = '¥' + total.toFixed(2);
            document.getElementById('summary-total').textContent = '¥' + total.toFixed(2);
        }

        // 支付方式切换时改变边框高亮样式
        document.addEventListener('change', function(e) {
            if (e.target.name === 'payment') {
                document.querySelectorAll('input[name="payment"]').forEach(radio => {
                    const label = radio.closest('label');
                    if (radio.checked) {
                        // 选中状态：红色边框 + 红色背景
                        label.style.borderColor = 'var(--primary)';
                        label.style.background = 'var(--primary-light)';
                    } else {
                        // 未选中状态：默认边框
                        label.style.borderColor = 'var(--border)';
                        label.style.background = '';
                    }
                });
            }
        });
        
        /**
         * 提交订单
         * 验证表单 → 创建订单 → 跳转订单列表
         * 实现方式：正则 test() 验证手机号 + createOrder() 全局函数创建订单 + setTimeout() 跳转
         */
        function placeOrder() {
            const name = document.getElementById('receiver-name').value.trim();
            const phone = document.getElementById('receiver-phone').value.trim();
            const address = document.getElementById('receiver-address').value.trim();
            
            // 表单验证
            if (!name) { showToast('请输入收货人姓名', 'error'); return; }
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showToast('请输入正确的手机号', 'error'); return; }
            if (!address) { showToast('请输入收货地址', 'error'); return; }
            
            // 创建订单
            const addressInfo = { name, phone, address };
            const order = createOrder(addressInfo);
            
            if (order) {
                showToast('订单提交成功！', 'success');
                // 1.5秒后跳转到个人中心订单列表
                setTimeout(() => {
                    window.location.href = 'profile.html?tab=orders';
                }, 1500);
            } else {
                showToast('订单提交失败，请重试', 'error');
            }
        }
        
        // 页面加载完成后渲染
        document.addEventListener('DOMContentLoaded', renderCheckout);
    </script>
</body>
</html>
