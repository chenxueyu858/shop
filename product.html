<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情 - 优选商城</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- =============================================
         顶部信息栏（与首页共用样式）
         ============================================= -->
    <div class="top-bar">
        <div class="container">
            <div class="left-links">
                <a href="index.html">优选商城欢迎您！</a>
                <a href="#">我的订单</a>
                <a href="#">客户服务</a>
            </div>
            <div class="right-links">
                <a href="login.html" class="login-link">登录</a>
                <a href="login.html#register" class="login-link">注册</a>
                <span class="user-info" style="display:none;"></span>
                <button class="btn-logout" style="display:none;" onclick="logout()">退出</button>
                <a href="cart.html">购物车 <span id="cart-badge" class="badge" style="display:none;">0</span></a>
            </div>
        </div>
    </div>

    <!-- 主头部 -->
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">U</div>
                <div class="logo-text">优选<span>商城</span></div>
            </a>
            <div class="search-box" style="position:relative;">
                <input type="text" id="search-input" placeholder="搜索商品、品牌、分类...">
                <button id="search-btn">🔍 搜索</button>
            </div>
            <div class="header-actions">
                <a href="profile.html" class="header-action-item">
                    <span class="icon">👤</span>
                    <span class="label">个人中心</span>
                </a>
                <a href="cart.html" class="header-action-item">
                    <span class="icon">🛒</span>
                    <span class="label">购物车</span>
                    <span id="cart-badge" class="badge" style="display:none;">0</span>
                </a>
            </div>
        </div>
    </header>


    <!-- =============================================
         商品详情区域
         左右两栏：图片画廊 + 商品信息
         实现方式：loadProductDetail() 读取 JSON + renderProductDetail() 动态渲染 HTML
         ============================================= -->
    <main class="main-content">
        <div class="container">
            <div id="product-detail-container">
                <div style="text-align:center; padding:80px; color:#999;">加载中...</div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <h4>购物指南</h4>
                    <a href="#">购物流程</a><a href="#">会员介绍</a><a href="#">常见问题</a><a href="#">联系客服</a>
                </div>
                <div class="footer-col">
                    <h4>配送方式</h4>
                    <a href="#">上门自提</a><a href="#">快递运输</a><a href="#">物流配送</a><a href="#">配送范围</a>
                </div>
                <div class="footer-col">
                    <h4>支付方式</h4>
                    <a href="#">货到付款</a><a href="#">在线支付</a><a href="#">分期付款</a><a href="#">银行卡支付</a>
                </div>
                <div class="footer-col">
                    <h4>售后服务</h4>
                    <a href="#">退换货政策</a><a href="#">退换货流程</a><a href="#">价格保护</a><a href="#">投诉建议</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>© 2026 优选商城 | 24215220120_陈学羽_大作业 | Web编程技术课程设计</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script>
        // =============================================
        // 商品详情页专属脚本
        // 函数: goToIndex()、loadProductDetail()、renderProductDetail()、
        //       switchImage()、switchTab()、changeQty()、validateQty()、
        //       addToCartWithQty()、buyNow()、updateDetailFavBtn()
        // 实现方式：URLSearchParams 读取 URL 参数 + fetch() 加载 JSON + innerHTML 动态渲染
        // =============================================

        /**
         * 跳转到首页并按分类筛选
         * 使用 sessionStorage 跨页面传递分类信息
         * @param {string} cat - 分类名称
         * 实现方式：sessionStorage.setItem() 存储分类 + window.location.href 跳转
         */
        function goToIndex(cat) {
            sessionStorage.setItem('shop_category', cat);
            window.location.href = 'index.html';
        }

        /**
         * 加载商品详情
         * 从 URL 参数中获取商品 ID，然后从 JSON 中查找对应商品
         * 实现方式：new URLSearchParams() 解析 URL 参数 + fetch() 异步请求 JSON
         */
        function loadProductDetail() {
            // 解析 URL 中的 id 参数（例如 product.html?id=1）
            const params = new URLSearchParams(window.location.search);
            const productId = parseInt(params.get('id'));
            
            // 请求商品数据 JSON 文件
            fetch('data/products.json')
                .then(res => res.json())
                .then(products => {
                    const product = products.find(p => p.id === productId);
                    if (product) {
                        renderProductDetail(product);
                    } else {
                        // 未找到商品
                        document.getElementById('product-detail-container').innerHTML = 
                            '<div style="text-align:center;padding:80px;color:#999;">商品不存在</div>';
                    }
                })
                .catch(err => {
                    // 网络错误处理
                    document.getElementById('product-detail-container').innerHTML = 
                        '<div style="text-align:center;padding:80px;color:#999;">加载失败，请刷新重试</div>';
                });
        }

        /**
         * 渲染商品详情 HTML
         * @param {Object} product - 商品数据对象
         * 实现方式：模板字符串 `` + Array.map().join('') 动态生成详情页 HTML
         */
        function renderProductDetail(product) {
            const container = document.getElementById('product-detail-container');
            // 获取所有图片（主图 + 缩略图）
            const images = product.images || [product.image];
            
            container.innerHTML = `
                <div class="product-detail">
                    <!-- ===== 左侧图片画廊 ===== -->
                    <div class="detail-gallery">
                        <!-- 主图显示区 -->
                        <div class="detail-main-image">
                            <img src="${images[0]}" alt="${product.name}" id="main-image" onerror="this.parentElement.innerHTML='<div style=width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#e0e0e0,#f0f0f0);color:#999;font-size:64px;>📦</div>'">
                        </div>
                        <!-- 缩略图列表，点击可切换主图 -->
                        <div class="detail-thumbnails">
                            ${images.map((img, i) => `
                                <div class="detail-thumbnail ${i === 0 ? 'active' : ''}" onclick="switchImage('${img}', this)">
                                    <img src="${img}" alt="${product.name}" onerror="this.innerHTML='📦'">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    
                    <!-- ===== 右侧商品信息 ===== -->
                    <div class="detail-info">
                        <!-- 商品名称 + 描述 -->
                        <h1 class="detail-name">${product.name}</h1>
                        <div class="detail-desc">${product.desc}</div>
                        
                        <!-- 价格区域（红色渐变背景） -->
                        <div class="detail-price-area">
                            <div class="price-label">优选价</div>
                            <span class="detail-price">${product.price.toFixed(2)}</span>
                            <span class="detail-original">¥${product.originalPrice.toFixed(2)}</span>
                        </div>
                        
                        <!-- 商品元信息：销量、评分、库存 -->
                        <div class="detail-meta">
                            <span>销量: ${product.sales}件</span>
                            <span>评分: ${'⭐'.repeat(Math.floor(product.rating))} ${product.rating}</span>
                            <span>库存: ${product.stock}件</span>
                        </div>
                        
                        <!-- 数量选择器 -->
                        <div class="quantity-selector">
                            <span>数量：</span>
                            <button class="qty-btn" onclick="changeQty(-1)">−</button>
                            <input type="number" class="qty-input" id="qty-input" value="1" min="1" max="${product.stock}" onchange="validateQty(${product.stock})">
                            <button class="qty-btn" onclick="changeQty(1)">+</button>
                            <span style="margin-left:16px;font-size:13px;color:#999;">库存 ${product.stock} 件</span>
                        </div>
                        
                        <!-- 操作按钮：收藏 + 加入购物车 + 立即购买 -->
                        <div class="detail-actions">
                            <button class="btn-add-to-cart" onclick="addToCartWithQty(${product.id})">加入购物车</button>
                            <button class="btn-buy-now" onclick="buyNow(${product.id})">立即购买</button>
                        </div>
                        <!-- 收藏按钮 -->
                        <div style="margin-top:12px;">
                            <button onclick="toggleFavorite(${product.id}); updateDetailFavBtn(${product.id});" 
                                    id="detail-fav-btn"
                                    style="background:none;border:1px solid var(--border);padding:8px 20px;border-radius:20px;cursor:pointer;font-size:14px;transition:all 0.3s;">
                                ${isFavorited(product.id) ? '❤️ 已收藏' : '🤍 收藏商品'}
                            </button>
                        </div>
                    </div>
                </div>
                
                <!-- ===== 商品详情标签页 ===== -->
                <div class="detail-tabs">
                    <!-- 标签页头部 -->
                    <div class="detail-tab-headers">
                        <div class="detail-tab-header active" onclick="switchTab(this, 'tab-detail')">商品详情</div>
                        <div class="detail-tab-header" onclick="switchTab(this, 'tab-params')">规格参数</div>
                    </div>
                    <!-- 商品详情内容 -->
                    <div class="detail-tab-content active" id="tab-detail">
                        <p style="white-space:pre-line;line-height:1.8;">${product.detail}</p>
                    </div>
                    <!-- 规格参数表格 -->
                    <div class="detail-tab-content" id="tab-params">
                        <table style="width:100%;border-collapse:collapse;">
                            <tr style="background:#fafafa;"><td style="padding:12px;border:1px solid #eee;width:150px;font-weight:600;">商品名称</td><td style="padding:12px;border:1px solid #eee;">${product.name}</td></tr>
                            <tr><td style="padding:12px;border:1px solid #eee;font-weight:600;">商品分类</td><td style="padding:12px;border:1px solid #eee;">${product.category}</td></tr>
                            <tr style="background:#fafafa;"><td style="padding:12px;border:1px solid #eee;font-weight:600;">商品编号</td><td style="padding:12px;border:1px solid #eee;">PRD${String(product.id).padStart(6,'0')}</td></tr>
                            <tr><td style="padding:12px;border:1px solid #eee;font-weight:600;">累计销量</td><td style="padding:12px;border:1px solid #eee;">${product.sales} 件</td></tr>
                            <tr style="background:#fafafa;"><td style="padding:12px;border:1px solid #eee;font-weight:600;">用户评分</td><td style="padding:12px;border:1px solid #eee;">${product.rating} 分</td></tr>
                        </table>
                    </div>
                </div>
            `;
        }

        /**
         * 切换主图显示
         * @param {string} src - 图片路径
         * @param {Element} el - 被点击的缩略图元素
         * 实现方式：getElementById('main-image').src 替换主图 + classList 切换缩略图高亮
         */
        function switchImage(src, el) {
            document.getElementById('main-image').src = src;
            document.querySelectorAll('.detail-thumbnail').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        /**
         * 切换详情标签页
         * @param {Element} el - 被点击的标签头元素
         * @param {string} tabId - 目标内容区 ID
         * 实现方式：querySelectorAll() + classList.add/remove('active') 切换标签
         */
        function switchTab(el, tabId) {
            document.querySelectorAll('.detail-tab-header').forEach(h => h.classList.remove('active'));
            document.querySelectorAll('.detail-tab-content').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        /**
         * 修改购买数量（加减按钮）
         * @param {number} delta - 变化量（+1 或 -1）
         * 实现方式：parseInt() 转数字 + Math.max()/Math.min() 限制范围
         */
        function changeQty(delta) {
            const input = document.getElementById('qty-input');
            let val = parseInt(input.value) || 1;
            val = Math.max(1, Math.min(val + delta, parseInt(input.max)));
            input.value = val;
        }

        /**
         * 验证手动输入的数量
         * @param {number} max - 最大库存量
         */
        function validateQty(max) {
            const input = document.getElementById('qty-input');
            let val = parseInt(input.value) || 1;
            input.value = Math.max(1, Math.min(val, max));
        }

        /**
         * 加入购物车（读取当前选择的数量）
         * @param {number} productId - 商品ID
         * 实现方式：getElementById('qty-input').value 读取数量 + 调用 addToCart() 全局函数
         */
        function addToCartWithQty(productId) {
            const qty = parseInt(document.getElementById('qty-input').value) || 1;
            addToCart(productId, qty);
        }

        /**
         * 立即购买：加入购物车后跳转到购物车页面
         * @param {number} productId - 商品ID
         * 实现方式：addToCart() 添加商品 + setTimeout() 延迟跳转到 cart.html
         */
        function buyNow(productId) {
            const qty = parseInt(document.getElementById('qty-input').value) || 1;
            addToCart(productId, qty);
            setTimeout(() => {
                window.location.href = 'cart.html';
            }, 500);
        }

        /**
         * 更新详情页收藏按钮状态
         * @param {number} productId - 商品ID
         * 实现方式：getElementById() 获取按钮 + innerHTML 更新文字和图标
         */
        function updateDetailFavBtn(productId) {
            const btn = document.getElementById('detail-fav-btn');
            if (btn) {
                btn.innerHTML = isFavorited(productId) ? '❤️ 已收藏' : '🤍 收藏商品';
            }
        }

        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', loadProductDetail);
    </script>
</body>
</html>
